# Dev console keeps the familiar Spring Boot text layout, but appends SLF4J
# fluent key-value pairs so RAG correlation fields are visible locally.
logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %5p ${PID: } --- [${spring.application.name}] [%15.15t] %-40.40logger{39} : %m %kvp%n%wEx

