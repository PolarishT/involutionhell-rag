# \u5F00\u53D1\u73AF\u5883\u76D1\u63A7
management.endpoints.web.exposure.include=health,info,metrics,loggers
management.endpoint.health.show-details=always
# ========= ACTUATOR =========
management.endpoint.health.probes.enabled=true
# =========================================================
# OpenTelemetry common configuration
# =========================================================
management.opentelemetry.enabled=true
management.opentelemetry.map-environment-variables=true
management.opentelemetry.resource-attributes.service.name=${spring.application.name}
management.opentelemetry.resource-attributes.service.namespace=rag
management.opentelemetry.resource-attributes.deployment.environment=dev
# =========================================================
# OpenTelemetry tracing
# =========================================================
# 100% sampling
management.tracing.sampling.probability=1.0
management.opentelemetry.tracing.sampler=always-on
# OTLP trace exporter
management.opentelemetry.tracing.export.otlp.endpoint=http://apm-server.interview.svc.cluster.local:8200
management.opentelemetry.tracing.export.otlp.transport=grpc
management.opentelemetry.tracing.export.otlp.headers.Authorization=Bearer ce144da9728e670f43de75e5b1389e0134f5d16072b1904121f4a528d872dc9e
# Export batching
management.opentelemetry.tracing.export.schedule-delay=5s
management.opentelemetry.tracing.export.timeout=30s
# Network timeout
management.opentelemetry.tracing.export.otlp.connect-timeout=10s
management.opentelemetry.tracing.export.otlp.timeout=10s
# =========================================================
# OpenTelemetry logs
# =========================================================
management.opentelemetry.logging.export.otlp.endpoint=http://apm-server.interview.svc.cluster.local:8200
management.opentelemetry.logging.export.otlp.transport=grpc
management.opentelemetry.logging.export.otlp.headers.Authorization=Bearer ce144da9728e670f43de75e5b1389e0134f5d16072b1904121f4a528d872dc9e
management.opentelemetry.logging.export.schedule-delay=1s
management.opentelemetry.logging.export.timeout=30s
management.opentelemetry.logging.export.otlp.connect-timeout=10s
management.opentelemetry.logging.export.otlp.timeout=10s
# =========================================================
# OpenTelemetry metrics
# =========================================================
management.otlp.metrics.export.enabled=true
# Micrometer OTLP metrics exporter uses an HTTP URL
management.otlp.metrics.export.url=http://apm-server.interview.svc.cluster.local:8200/v1/metrics
management.otlp.metrics.export.headers.Authorization=Bearer ce144da9728e670f43de75e5b1389e0134f5d16072b1904121f4a528d872dc9e
# Equivalent to the previous 10000 ms interval
management.otlp.metrics.export.step=10s
management.otlp.metrics.export.connect-timeout=10s
management.otlp.metrics.export.read-timeout=10s
# =========================================================
# Log correlation
# =========================================================
# Include traceId and spanId in console logs
logging.pattern.correlation=[%X{traceId:-},%X{spanId:-}]
logging.include-application-name=false
