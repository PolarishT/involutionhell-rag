name: Build and Push Native Image

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "src/**"
      - "pom.xml"
      - "mvnw"
      - "mvnw.cmd"
      - ".mvn/**"
      - ".github/workflows/build-native-image.yml"

permissions:
  contents: read

concurrency:
  group: native-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-native-image:
    name: Build Native Image
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    env:
      IMAGE_REPOSITORY: ${{ secrets.DOCKERHUB_USERNAME }}/unsw-opensource

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up GraalVM for Java 25
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: "25"
          distribution: graalvm-community
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: maven
          components: native-image

      - name: Validate required secrets
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DIGITALOCEAN_ACCESS_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          DO_CLUSTER_NAME: ${{ secrets.DO_CLUSTER_NAME }}
        run: |
          set -euo pipefail

          required_secrets=(
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
            DIGITALOCEAN_ACCESS_TOKEN
            DO_CLUSTER_NAME
          )

          for secret_name in "${required_secrets[@]}"; do
            if [ -z "${!secret_name:-}" ]; then
              echo "::error::Missing GitHub secret: ${secret_name}"
              exit 1
            fi
          done

      - name: Verify build environment
        shell: bash
        run: |
          set -euo pipefail

          java -version
          native-image --version
          docker version
          uname -a

      - name: Make Maven Wrapper executable
        run: chmod +x ./mvnw

      - name: Generate image metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail

          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE="${IMAGE_REPOSITORY}:${SHORT_SHA}"

          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

          echo "Building image: ${IMAGE}"

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Spring Boot native image in quick mode
        shell: bash
        run: |
          set -euo pipefail

          ./mvnw \
            --batch-mode \
            --no-transfer-progress \
            -Pnative \
            -DskipTests \
            spring-boot:build-image \
            -Dspring-boot.build-image.imageName="${{ steps.metadata.outputs.image }}" \
            -Dspring-boot.build-image.environment.BP_NATIVE_IMAGE=true \
            -Dspring-boot.build-image.environment.BP_JVM_VERSION=25 \
            -Dspring-boot.build-image.environment.BP_SPRING_AOT_ENABLED=true \
            -Dspring-boot.build-image.environment.BP_NATIVE_IMAGE_BUILD_ARGUMENTS=-Ob \
            -Dspring-boot.build-image.builder=paketobuildpacks/builder-jammy-java-tiny

      - name: Inspect generated image
        shell: bash
        run: |
          set -euo pipefail

          docker image inspect \
            "${{ steps.metadata.outputs.image }}" \
            --format='Image={{index .RepoTags 0}} OS={{.Os}} Architecture={{.Architecture}} Size={{.Size}}'

      - name: Push commit and latest images
        shell: bash
        run: |
          set -euo pipefail

          COMMIT_IMAGE="${{ steps.metadata.outputs.image }}"
          LATEST_IMAGE="${IMAGE_REPOSITORY}:latest"

          docker tag "${COMMIT_IMAGE}" "${LATEST_IMAGE}"

          docker push "${COMMIT_IMAGE}"
          docker push "${LATEST_IMAGE}"

      - name: Write build summary
        shell: bash
        run: |
          {
            echo "## Native Image Build Completed 🚀"
            echo ""
            echo "| Item | Value |"
            echo "|---|---|"
            echo "| Commit | \`${GITHUB_SHA}\` |"
            echo "| Immutable image | \`${{ steps.metadata.outputs.image }}\` |"
            echo "| Latest image | \`${IMAGE_REPOSITORY}:latest\` |"
            echo "| Runner architecture | \`linux/amd64\` |"
            echo "| Builder | \`paketobuildpacks/builder-jammy-java-tiny\` |"
            echo "| Native build | \`BP_NATIVE_IMAGE=true\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Save Kubernetes credentials
        shell: bash
        run: |
          set -euo pipefail

          doctl kubernetes cluster kubeconfig save \
            "${{ secrets.DO_CLUSTER_NAME }}"

      - name: Deploy immutable image
        shell: bash
        run: |
          set -euo pipefail

          CONTAINER_NAME="$(
            kubectl -n interview get deployment rag-server \
              -o jsonpath='{.spec.template.spec.containers[0].name}'
          )"

          echo "Deployment container: ${CONTAINER_NAME}"
          echo "Deploying image: ${{ steps.metadata.outputs.image }}"

          kubectl -n interview set image \
            deployment/rag-server \
            "${CONTAINER_NAME}=${{ steps.metadata.outputs.image }}"

      - name: Wait for rollout
        shell: bash
        run: |
          set -euo pipefail

          kubectl -n interview rollout status \
            deployment/rag-server \
            --timeout=300s

      - name: Show deployed image
        shell: bash
        run: |
          kubectl -n interview get deployment rag-server \
            -o jsonpath='{.spec.template.spec.containers[0].image}{"\n"}'

      - name: Show pods
        shell: bash
        run: |
          kubectl -n interview get pods \
            -l app=rag-server \
            -o wide

      - name: Send deployment result
        if: always()
        uses: dawidd6/action-send-mail@v6
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: >-
            ${{ job.status == 'success' && '✅ RAG 后端部署成功' || '❌ RAG 后端部署失败' }}
          to: zhangzhenting.lay@gmail.com
          from: GitHub Actions
          body: |
            部署状态：${{ job.status }}
            项目：${{ github.repository }}
            分支：${{ github.ref_name }}
            Commit：${{ github.sha }}
            镜像：${{ steps.metadata.outputs.image }}
            操作者：${{ github.actor }}

            查看日志：
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}